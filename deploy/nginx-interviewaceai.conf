# Nginx reverse proxy for interviewaceai.peculiex.com
# Put this file at: /etc/nginx/sites-available/interviewaceai
# Then enable it:   sudo ln -s /etc/nginx/sites-available/interviewaceai /etc/nginx/sites-enabled/
# Test + reload:    sudo nginx -t && sudo systemctl reload nginx
#
# This serves the Next.js app that is running on http://127.0.0.1:3000
# (started by PM2). Certbot will later add the HTTPS (443) block automatically.

server {
    listen 80;
    listen [::]:80;

    server_name interviewaceai.peculiex.com;

    # Allow large uploads (resumes / recordings).
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / streaming support (Supabase realtime, live features).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass the real host + client info so the app builds correct URLs.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_cache_bypass $http_upgrade;
    }
}
